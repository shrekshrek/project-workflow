# scaffold-v2 dev docker-compose
#
# 启动:`pnpm dev`(根 package.json 封装,见 README)
# 资源隔离:通过 .env 的 PROJECT_NAME 区分,多项目并行不冲突
#
# 服务:
#   - postgres_db:  Postgres 16,数据持久卷
#   - backend:      FastAPI + uv,挂载源码热重载,启动时跑 alembic upgrade
#
# 前端不在 compose 里(host 上 pnpm fe:dev,享受 vite HMR 速度)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    # 多项目并行占用 5432 时,在 .env 改 POSTGRES_PORT(host 端,容器内还是 5432)
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app_dev_password}@postgres:5432/${POSTGRES_DB:-app}
      JWT_SECRET: ${JWT_SECRET:-dev_only_change_in_prod}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
  backend_venv:
