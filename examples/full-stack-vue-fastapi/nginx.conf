# scaffold-v2 nginx 反向代理(可选,本地开发不必跑)
#
# 何时用:
#   - 本地希望前后端同源(避免 CORS),起一个 nginx 容器把 80 端口转到这里
#   - 生产:nginx 容器 + 前端构建产物 + 后端容器,这份配置直接复用
#
# 本地开发(无 nginx)推荐:
#   - 前端 vite 跑 5173,后端 uvicorn 跑 8000
#   - vite.config.ts 的 proxy 把 /api/v1/* 转到 backend:8000
#   - CORS_ORIGINS=http://localhost:5173 让后端放行

upstream backend {
  server backend:8000;
}

upstream frontend {
  # 生产时指向静态 dist;开发时若也走 nginx,可指向 host.docker.internal:5173
  server frontend:80;
}

server {
  listen 80;
  client_max_body_size 50m;

  # 后端 API
  location /api/v1/ {
    proxy_pass http://backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # FastAPI 自带文档(仅 dev,生产可关掉)
  location ~ ^/(docs|redoc|openapi\.json) {
    proxy_pass http://backend;
    proxy_set_header Host $host;
  }

  # 前端(其他全交给前端)
  location / {
    proxy_pass http://frontend;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
